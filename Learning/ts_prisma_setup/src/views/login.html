<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-sm text-center">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back</h1>
      <p class="text-gray-500 mb-6 text-sm">Sign in to continue</p>

      <a
        href="/auth/google"
        class="flex items-center justify-center gap-3 w-full border border-gray-300 rounded-lg px-4 py-2 text-gray-700 hover:bg-gray-50 transition"
      >
        <img
          src="https://www.svgrepo.com/show/475656/google-color.svg"
          class="w-5 h-5"
        />
        <span class="text-sm font-medium">Continue with Google</span>
      </a>
    </div>
  </body>
</html>
